<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forever Fireflies — Navigation Explorer</title>
<style>
  :root {
    --bg: #FAF8F5;
    --card: #FEFCF9;
    --accent: #E8724A;
    --accent-pressed: #CC6441;
    --accent-soft: rgba(232,114,74,0.08);
    --accent-glow: rgba(232,114,74,0.12);
    --text: #2C2420;
    --text-soft: #8C7E74;
    --text-muted: #B5AAA0;
    --border: #EDE8E3;
    --tag: #F3EDE8;
    --danger: #D94F4F;
    --success: #4CAF7C;
    --glow: #F2C94C;
    --glow-soft: #FDF6E3;
    --child-blue: #7BAFD4;
    --child-amber: #D4A07B;
    --child-green: #9BC49B;
    --shadow-sm: 0 1px 3px rgba(44,36,32,0.06);
    --shadow-md: 0 4px 12px rgba(44,36,32,0.10);
    --shadow-phone: 0 8px 32px rgba(44,36,32,0.12);
    --mic-glow: 0 4px 20px rgba(232,114,74,0.35);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #1a1a1a;
    color: #e0e0e0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 16px;
  }

  h1 {
    font-size: 20px;
    font-weight: 600;
    margin-bottom: 4px;
    color: #fff;
  }
  .subtitle {
    font-size: 13px;
    color: #888;
    margin-bottom: 20px;
  }

  /* Layout selector */
  .controls {
    display: flex;
    gap: 8px;
    margin-bottom: 24px;
    background: #2a2a2a;
    padding: 4px;
    border-radius: 12px;
  }
  .controls button {
    font-family: inherit;
    font-size: 13px;
    font-weight: 600;
    padding: 8px 20px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    background: transparent;
    color: #888;
    transition: all 150ms ease;
  }
  .controls button.active {
    background: var(--accent);
    color: #fff;
  }
  .controls button:not(.active):hover {
    color: #ccc;
    background: #333;
  }

  /* Phone frame */
  .phone-frame {
    width: 390px;
    height: 844px;
    background: #fff;
    border-radius: 40px;
    box-shadow: var(--shadow-phone), 0 0 0 1px rgba(44,36,32,0.08);
    overflow: hidden;
    position: relative;
    flex-shrink: 0;
  }

  /* Status bar */
  .status-bar {
    height: 54px;
    padding: 14px 28px 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: var(--bg);
    position: relative;
    z-index: 20;
  }
  .status-time {
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
  }
  .status-icons {
    display: flex;
    gap: 6px;
    align-items: center;
  }
  .status-icons svg { width: 16px; height: 16px; }

  /* Home indicator */
  .home-indicator {
    position: absolute;
    bottom: 8px;
    left: 50%;
    transform: translateX(-50%);
    width: 134px;
    height: 5px;
    background: var(--text);
    border-radius: 100px;
    opacity: 0.2;
    z-index: 30;
  }

  /* App screen container */
  .app-screen {
    position: absolute;
    top: 54px;
    left: 0;
    right: 0;
    bottom: 0;
    background: var(--bg);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* =================== TOP BAR VARIANTS =================== */

  .top-bar {
    padding: 8px 20px 12px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: var(--bg);
    position: relative;
    z-index: 10;
    flex-shrink: 0;
  }
  .top-bar-title {
    font-family: Georgia, 'Merriweather', serif;
    font-size: 22px;
    font-weight: 800;
    color: var(--text);
    letter-spacing: -0.3px;
  }
  .top-bar-icons {
    display: flex;
    gap: 8px;
  }
  .icon-btn {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: rgba(243,237,232,0.5);
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-size: 14px;
    transition: opacity 150ms;
  }
  .icon-btn:hover { opacity: 0.7; }
  .icon-btn svg { width: 16px; height: 16px; }

  /* Top nav tabs row (layout 3) */
  .top-nav-tabs {
    display: flex;
    gap: 0;
    padding: 0 20px 12px;
    background: var(--bg);
    position: relative;
    z-index: 10;
    flex-shrink: 0;
    transition: all 250ms ease;
    overflow: hidden;
    max-height: 44px;
    opacity: 1;
  }
  .top-nav-tabs.hidden {
    max-height: 0;
    opacity: 0;
    padding-bottom: 0;
  }
  .top-nav-tab {
    flex: 1;
    text-align: center;
    padding: 8px 4px;
    font-size: 13px;
    font-weight: 600;
    color: var(--text-soft);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 150ms ease;
  }
  .top-nav-tab.active {
    color: var(--accent);
    border-bottom-color: var(--accent);
  }
  .top-nav-tab:hover:not(.active) {
    color: var(--text);
  }

  /* =================== CONTENT AREA =================== */

  .content-scroll {
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
    -webkit-overflow-scrolling: touch;
    scroll-behavior: smooth;
  }
  .content-scroll::-webkit-scrollbar { display: none; }

  .content-inner {
    padding: 0 20px;
  }

  /* =================== ENTRY CARDS =================== */

  .entry-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    box-shadow: var(--shadow-sm);
    padding: 14px 16px;
    margin-bottom: 10px;
    position: relative;
    overflow: hidden;
    cursor: pointer;
    transition: background 150ms ease;
  }
  .entry-card:hover { background: #F7F4F1; }

  .entry-card .accent-bar {
    position: absolute;
    left: 0;
    top: 0;
    bottom: 0;
    width: 3px;
  }

  .entry-card .card-header {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 6px;
  }
  .child-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .child-name {
    font-family: Georgia, 'Merriweather', serif;
    font-size: 11px;
    font-weight: 600;
  }
  .card-date {
    font-size: 10px;
    color: var(--text-muted);
    margin-left: auto;
  }
  .card-heart {
    color: var(--accent);
    font-size: 12px;
    margin-left: 4px;
  }

  .card-preview {
    font-family: Georgia, 'Merriweather', serif;
    font-size: 14px;
    line-height: 1.55;
    color: var(--text);
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .card-preview.three-lines {
    -webkit-line-clamp: 3;
  }

  /* Favorited card variant */
  .entry-card.favorited {
    border-color: rgba(232,114,74,0.2);
    box-shadow: 0 0 0 1.5px rgba(232,114,74,0.25), 0 3px 12px rgba(232,114,74,0.10);
  }

  /* =================== FLOATING MIC =================== */

  .mic-area {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding-bottom: 36px;
    z-index: 15;
    pointer-events: none;
  }
  .mic-area::before {
    content: '';
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 160px;
    background: linear-gradient(to bottom, rgba(250,248,245,0) 0%, rgba(250,248,245,0.55) 55%, var(--bg) 100%);
    pointer-events: none;
  }
  .mic-btn {
    width: 68px;
    height: 68px;
    border-radius: 50%;
    background: var(--accent);
    border: none;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: var(--mic-glow);
    cursor: pointer;
    position: relative;
    z-index: 2;
    pointer-events: all;
    transition: transform 100ms ease, background 100ms ease;
  }
  .mic-btn:hover { background: var(--accent-pressed); transform: scale(1.04); }
  .mic-btn svg { width: 28px; height: 28px; fill: #fff; }
  .write-link {
    font-size: 13px;
    color: var(--text-soft);
    margin-top: 8px;
    position: relative;
    z-index: 2;
    pointer-events: all;
    cursor: pointer;
  }
  .write-link:hover { color: var(--accent); }

  /* =================== BOTTOM TAB BAR =================== */

  .bottom-tab-bar {
    display: flex;
    align-items: flex-end;
    justify-content: space-around;
    background: #fff;
    border-top: 1px solid var(--border);
    box-shadow: 0 -2px 8px rgba(44,36,32,0.04);
    padding: 8px 8px 28px;
    position: relative;
    z-index: 20;
    flex-shrink: 0;
  }
  .tab-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
    cursor: pointer;
    padding: 4px 8px;
    min-width: 52px;
    transition: color 150ms ease;
  }
  .tab-item .tab-icon {
    font-size: 20px;
    height: 24px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .tab-item .tab-label {
    font-size: 10px;
    font-weight: 600;
  }
  .tab-item.inactive { color: var(--text-soft); }
  .tab-item.active { color: var(--accent); }

  .tab-mic-btn {
    width: 56px;
    height: 56px;
    border-radius: 50%;
    background: var(--accent);
    border: none;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: var(--mic-glow);
    cursor: pointer;
    margin-top: -24px;
    margin-bottom: 2px;
    transition: transform 100ms ease, background 100ms ease;
    flex-shrink: 0;
  }
  .tab-mic-btn:hover { background: var(--accent-pressed); transform: scale(1.04); }
  .tab-mic-btn svg { width: 24px; height: 24px; fill: #fff; }

  /* =================== CALENDAR SCREEN =================== */

  .calendar-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 0 16px;
  }
  .calendar-header .month-title {
    font-size: 16px;
    font-weight: 700;
    color: var(--text);
  }
  .calendar-header .arrow {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    background: var(--tag);
    border: none;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-size: 14px;
    color: var(--text-soft);
  }

  .calendar-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 2px;
  }
  .cal-day-label {
    text-align: center;
    font-size: 11px;
    font-weight: 600;
    color: var(--text-muted);
    padding: 4px 0 8px;
  }
  .cal-day {
    text-align: center;
    padding: 8px 4px;
    font-size: 13px;
    color: var(--text);
    position: relative;
    border-radius: 8px;
    cursor: pointer;
  }
  .cal-day:hover { background: var(--tag); }
  .cal-day.empty { cursor: default; }
  .cal-day.empty:hover { background: none; }
  .cal-day.today {
    font-weight: 700;
    color: var(--accent);
  }
  .cal-day .entry-dot {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: var(--accent);
    margin: 2px auto 0;
  }

  /* =================== PROFILE SCREEN =================== */

  .profile-section {
    margin-bottom: 20px;
  }
  .profile-section-title {
    font-size: 12px;
    font-weight: 700;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.8px;
    padding: 0 0 8px;
  }
  .profile-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    box-shadow: var(--shadow-sm);
    overflow: hidden;
  }
  .profile-row {
    display: flex;
    align-items: center;
    padding: 14px 16px;
    gap: 12px;
    cursor: pointer;
    transition: background 150ms;
  }
  .profile-row:hover { background: #F7F4F1; }
  .profile-row + .profile-row {
    border-top: 1px solid var(--border);
  }
  .profile-row .row-icon {
    width: 32px;
    height: 32px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    flex-shrink: 0;
  }
  .profile-row .row-label {
    font-size: 14px;
    font-weight: 500;
    color: var(--text);
    flex: 1;
  }
  .profile-row .row-value {
    font-size: 13px;
    color: var(--text-muted);
  }
  .profile-row .row-chevron {
    color: var(--text-muted);
    font-size: 14px;
  }
  .profile-row.danger .row-label { color: var(--danger); }

  .toggle-track {
    width: 44px;
    height: 26px;
    border-radius: 13px;
    background: var(--border);
    position: relative;
    cursor: pointer;
    transition: background 150ms;
  }
  .toggle-track.on { background: var(--accent); }
  .toggle-track .toggle-thumb {
    width: 22px;
    height: 22px;
    border-radius: 50%;
    background: #fff;
    box-shadow: 0 1px 3px rgba(44,36,32,0.15);
    position: absolute;
    top: 2px;
    left: 2px;
    transition: transform 150ms ease;
  }
  .toggle-track.on .toggle-thumb { transform: translateX(18px); }

  /* Child color dots in profile */
  .child-color-pill {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  /* =================== JAR SCREEN =================== */

  .jar-bg {
    background: linear-gradient(180deg, #FDF6E3 0%, var(--bg) 35%);
  }
  .jar-header {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 4px 0 16px;
  }
  .jar-count {
    font-size: 13px;
    font-weight: 600;
    color: var(--text-soft);
  }

  /* =================== PROMPT OUTPUT =================== */

  .prompt-area {
    margin-top: 20px;
    width: 390px;
    background: #2a2a2a;
    border-radius: 12px;
    padding: 16px;
  }
  .prompt-label {
    font-size: 11px;
    font-weight: 600;
    color: #666;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 8px;
  }
  .prompt-text {
    font-size: 13px;
    line-height: 1.6;
    color: #ccc;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }
  .copy-btn {
    margin-top: 12px;
    background: #333;
    border: 1px solid #444;
    color: #ccc;
    font-size: 12px;
    font-weight: 600;
    padding: 6px 16px;
    border-radius: 6px;
    cursor: pointer;
    font-family: inherit;
    transition: all 150ms;
  }
  .copy-btn:hover { background: #444; color: #fff; }
  .copy-btn.copied { background: #2a5a3a; border-color: #3a7a4a; color: #7ddb8d; }

  /* SVG icon helpers */
  .icon-svg { fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
</style>
</head>
<body>

<h1>Forever Fireflies — Navigation Explorer</h1>
<p class="subtitle">Compare 3 navigation layouts. Tap tabs inside the phone to switch screens.</p>

<div class="controls" id="layout-controls">
  <button class="active" onclick="setLayout('current')">Current</button>
  <button onclick="setLayout('bottom-bar')">Bottom Bar</button>
  <button onclick="setLayout('top-nav')">Top Nav</button>
</div>

<div class="phone-frame" id="phone">
  <!-- Status bar -->
  <div class="status-bar">
    <span class="status-time">9:41</span>
    <div class="status-icons">
      <svg viewBox="0 0 16 16" fill="var(--text)"><path d="M1 10h2v4H1zM5 7h2v7H5zM9 4h2v10H9zM13 1h2v13h-2z"/></svg>
      <svg viewBox="0 0 16 16" fill="var(--text)"><path d="M8 3c3 0 5.5 2 6.5 4-1 2-3.5 4-6.5 4s-5.5-2-6.5-4c1-2 3.5-4 6.5-4z"/><circle cx="8" cy="7" r="2" fill="var(--bg)"/></svg>
      <svg viewBox="0 0 20 12" fill="var(--text)"><rect x="0" y="1" width="16" height="10" rx="2" fill="none" stroke="var(--text)" stroke-width="1.5"/><rect x="2" y="3" width="11" height="6" rx="1"/><rect x="17" y="4" width="2" height="4" rx="0.5"/></svg>
    </div>
  </div>

  <!-- App screen - dynamically rendered -->
  <div class="app-screen" id="app-screen"></div>

  <!-- Home indicator -->
  <div class="home-indicator"></div>
</div>

<div class="prompt-area">
  <div class="prompt-label">Prompt Output</div>
  <div class="prompt-text" id="prompt-text"></div>
  <button class="copy-btn" id="copy-btn" onclick="copyPrompt()">Copy Prompt</button>
</div>

<script>
// ============= STATE =============
const state = {
  layout: 'current',
  activeTab: 'home',
  lastScrollTop: 0,
  tabsHidden: false
};

// ============= DATA =============
const entries = [
  { child: 'Emma', color: '#7BAFD4', date: 'Mar 4, 2026', time: '8:42 PM', preview: '"Daddy, did you know that butterflies remember being caterpillars? I think that\'s why they fly — they\'re so happy they got wings."', fav: true },
  { child: 'Liam', color: '#D4A07B', date: 'Mar 3, 2026', time: '7:15 PM', preview: 'Liam saw the moon during the day and said "the moon is sneaking!" Then he whispered to it, "go back to bed, moon."', fav: false },
  { child: 'Emma', color: '#7BAFD4', date: 'Mar 2, 2026', time: '9:01 PM', preview: 'She asked if trees get tired of standing up all day. I said I wasn\'t sure. She said "maybe that\'s why they drop their leaves — they\'re stretching."', fav: false },
  { child: 'Liam', color: '#D4A07B', date: 'Mar 1, 2026', time: '6:30 PM', preview: 'He put his shoes on the wrong feet and said "my feet are being silly today." When I tried to fix them he said "no, they like it this way."', fav: true },
  { child: 'Emma', color: '#7BAFD4', date: 'Feb 28, 2026', time: '8:20 PM', preview: 'At bedtime she said "I love you more than all the numbers" and when I said that\'s a lot she said "I know, that\'s why I picked it."', fav: false },
  { child: 'Liam', color: '#D4A07B', date: 'Feb 27, 2026', time: '7:45 PM', preview: 'He told me very seriously that his stuffed bear had a doctor appointment tomorrow and he needed to bring snacks for the waiting room.', fav: false }
];

const jarEntries = entries.filter(e => e.fav).concat([
  { child: 'Emma', color: '#7BAFD4', date: 'Feb 20, 2026', time: '8:10 PM', preview: 'She drew a picture of our family and gave everyone wings. When I asked why she said "so we can always find each other, even if we get lost."', fav: true },
  { child: 'Liam', color: '#D4A07B', date: 'Feb 14, 2026', time: '7:00 PM', preview: '"Mommy, when I grow up I want to be a dinosaur. Not the scary kind. The kind that eats leaves and has a long neck so I can see everything."', fav: true }
]);

const calendarDots = [1, 3, 4, 7, 10, 12, 15, 18, 21, 24, 27];

// ============= SVG ICONS =============
const micSVG = `<svg viewBox="0 0 24 24" fill="white"><path d="M12 1a4 4 0 0 0-4 4v6a4 4 0 0 0 8 0V5a4 4 0 0 0-4-4z"/><path d="M19 10v1a7 7 0 0 1-14 0v-1M12 18.5V23M8 23h8" fill="none" stroke="white" stroke-width="2" stroke-linecap="round"/></svg>`;

const searchIcon = `<svg viewBox="0 0 20 20" class="icon-svg" width="16" height="16"><circle cx="9" cy="9" r="5"/><line x1="13" y1="13" x2="17" y2="17"/></svg>`;
const heartIcon = `<svg viewBox="0 0 20 20" width="16" height="16"><path d="M10 17s-7-4.5-7-9a4 4 0 0 1 7.5-2 4 4 0 0 1 7.5 2c0 4.5-7 9-7 9z" fill="var(--accent)" stroke="none"/></svg>`;
const gearIcon = `<svg viewBox="0 0 20 20" class="icon-svg" width="16" height="16"><circle cx="10" cy="10" r="3"/><path d="M10 1v2M10 17v2M1 10h2M17 10h2M3.5 3.5l1.4 1.4M15.1 15.1l1.4 1.4M3.5 16.5l1.4-1.4M15.1 4.9l1.4-1.4"/></svg>`;

// ============= RENDERERS =============

function renderEntryCard(entry, isJar = false) {
  return `
    <div class="entry-card${entry.fav && !isJar ? ' favorited' : ''}${isJar ? ' favorited' : ''}">
      <div class="accent-bar" style="background: ${entry.color}"></div>
      <div class="card-header">
        <div class="child-dot" style="background: ${entry.color}"></div>
        <span class="child-name" style="color: ${entry.color}">${entry.child}</span>
        <span class="card-date">${entry.date} · ${entry.time}</span>
        ${entry.fav ? '<span class="card-heart">♥</span>' : ''}
      </div>
      <div class="card-preview${isJar ? ' three-lines' : ''}">${entry.preview}</div>
    </div>`;
}

function renderHomeContent() {
  return `<div class="content-inner" style="padding-top: 8px; padding-bottom: 160px;">
    ${entries.map(e => renderEntryCard(e)).join('')}
  </div>`;
}

function renderJarContent() {
  return `<div class="content-inner jar-bg" style="padding-top: 8px; padding-bottom: 160px;">
    <div class="jar-header">
      <span style="color: var(--accent); font-size: 16px;">♥</span>
      <span class="jar-count">${jarEntries.length} memories saved</span>
    </div>
    ${jarEntries.map(e => renderEntryCard(e, true)).join('')}
  </div>`;
}

function renderCalendarContent() {
  const days = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
  // March 2026 starts on Sunday
  const startDay = 0; // Sunday
  const totalDays = 31;

  let grid = days.map(d => `<div class="cal-day-label">${d}</div>`).join('');
  for (let i = 0; i < startDay; i++) grid += `<div class="cal-day empty"></div>`;
  for (let d = 1; d <= totalDays; d++) {
    const isToday = d === 4;
    const hasDot = calendarDots.includes(d);
    grid += `<div class="cal-day${isToday ? ' today' : ''}">${d}${hasDot ? '<div class="entry-dot"></div>' : ''}</div>`;
  }

  return `<div class="content-inner" style="padding-top: 8px; padding-bottom: 160px;">
    <div class="calendar-header">
      <button class="arrow">‹</button>
      <span class="month-title">March 2026</span>
      <button class="arrow">›</button>
    </div>
    <div class="calendar-grid">${grid}</div>
    <div style="margin-top: 24px;">
      <div style="font-size: 14px; font-weight: 600; color: var(--text); margin-bottom: 12px;">Recent</div>
      ${entries.slice(0, 2).map(e => renderEntryCard(e)).join('')}
    </div>
  </div>`;
}

function renderProfileContent() {
  return `<div class="content-inner" style="padding-top: 8px; padding-bottom: 160px;">
    <div class="profile-section">
      <div class="profile-section-title">Children</div>
      <div class="profile-card">
        <div class="profile-row">
          <div class="row-icon" style="background: rgba(123,175,212,0.12);">
            <div class="child-dot" style="background: var(--child-blue); width: 10px; height: 10px;"></div>
          </div>
          <span class="row-label">Emma</span>
          <span class="row-value">Age 5</span>
          <span class="row-chevron">›</span>
        </div>
        <div class="profile-row">
          <div class="row-icon" style="background: rgba(212,160,123,0.12);">
            <div class="child-dot" style="background: var(--child-amber); width: 10px; height: 10px;"></div>
          </div>
          <span class="row-label">Liam</span>
          <span class="row-value">Age 3</span>
          <span class="row-chevron">›</span>
        </div>
        <div class="profile-row">
          <div class="row-icon" style="background: var(--accent-soft);">
            <span style="color: var(--accent); font-size: 16px;">+</span>
          </div>
          <span class="row-label" style="color: var(--accent);">Add Child</span>
        </div>
      </div>
    </div>

    <div class="profile-section">
      <div class="profile-section-title">Preferences</div>
      <div class="profile-card">
        <div class="profile-row">
          <div class="row-icon" style="background: var(--tag);">🔔</div>
          <span class="row-label">Daily Reminder</span>
          <div class="toggle-track on" onclick="this.classList.toggle('on')"><div class="toggle-thumb"></div></div>
        </div>
        <div class="profile-row">
          <div class="row-icon" style="background: var(--tag);">⏰</div>
          <span class="row-label">Reminder Time</span>
          <span class="row-value">8:00 PM</span>
          <span class="row-chevron">›</span>
        </div>
      </div>
    </div>

    <div class="profile-section">
      <div class="profile-section-title">Subscription</div>
      <div class="profile-card">
        <div class="profile-row">
          <div class="row-icon" style="background: rgba(242,201,76,0.12);">✨</div>
          <span class="row-label">Free Trial</span>
          <span class="row-value">12 days left</span>
          <span class="row-chevron">›</span>
        </div>
      </div>
    </div>

    <div class="profile-section">
      <div class="profile-section-title">About</div>
      <div class="profile-card">
        <div class="profile-row">
          <div class="row-icon" style="background: var(--tag);">📋</div>
          <span class="row-label">Privacy Policy</span>
          <span class="row-chevron">›</span>
        </div>
        <div class="profile-row">
          <div class="row-icon" style="background: var(--tag);">📄</div>
          <span class="row-label">Terms of Service</span>
          <span class="row-chevron">›</span>
        </div>
        <div class="profile-row">
          <div class="row-icon" style="background: var(--tag);">💬</div>
          <span class="row-label">Contact Support</span>
          <span class="row-chevron">›</span>
        </div>
      </div>
    </div>

    <div class="profile-section">
      <div class="profile-card">
        <div class="profile-row danger">
          <span class="row-label" style="text-align: center; width: 100%; color: var(--danger); font-weight: 600;">Sign Out</span>
        </div>
      </div>
    </div>
  </div>`;
}

function getScreenContent(tab) {
  switch (tab) {
    case 'home': return renderHomeContent();
    case 'jar': return renderJarContent();
    case 'calendar': return renderCalendarContent();
    case 'profile': return renderProfileContent();
    default: return renderHomeContent();
  }
}

// ============= LAYOUT RENDERERS =============

function renderCurrentLayout() {
  const isHome = state.activeTab === 'home';
  return `
    <div class="top-bar">
      <span class="top-bar-title">Forever Fireflies</span>
      <div class="top-bar-icons">
        <div class="icon-btn">${searchIcon}</div>
        <div class="icon-btn" onclick="switchTab('jar')" style="color: ${state.activeTab === 'jar' ? 'var(--accent)' : 'var(--text-soft)'}">${heartIcon}</div>
        <div class="icon-btn" onclick="switchTab('profile')">${gearIcon}</div>
      </div>
    </div>
    <div class="content-scroll">
      ${getScreenContent(state.activeTab)}
    </div>
    ${state.activeTab === 'home' || state.activeTab === 'jar' ? `
    <div class="mic-area">
      <button class="mic-btn">${micSVG}</button>
      <span class="write-link">or write instead</span>
    </div>` : ''}
  `;
}

function renderBottomBarLayout() {
  const tabs = [
    { id: 'home', icon: '🏠', label: 'Home' },
    { id: 'jar', icon: '✨', label: 'Jar' },
    { id: 'mic', icon: 'mic', label: '' },
    { id: 'calendar', icon: '📅', label: 'Calendar' },
    { id: 'profile', icon: '👤', label: 'Profile' },
  ];

  const tabsHTML = tabs.map(t => {
    if (t.id === 'mic') {
      return `<button class="tab-mic-btn">${micSVG}</button>`;
    }
    const isActive = state.activeTab === t.id;
    return `<div class="tab-item ${isActive ? 'active' : 'inactive'}" onclick="switchTab('${t.id}')">
      <span class="tab-icon">${t.icon}</span>
      <span class="tab-label">${t.label}</span>
    </div>`;
  }).join('');

  return `
    <div class="top-bar">
      <span class="top-bar-title">Forever Fireflies</span>
      <div class="top-bar-icons">
        <div class="icon-btn">${searchIcon}</div>
      </div>
    </div>
    <div class="content-scroll" style="padding-bottom: 0;">
      ${getScreenContent(state.activeTab).replace('padding-bottom: 160px', 'padding-bottom: 20px')}
    </div>
    <div class="bottom-tab-bar">${tabsHTML}</div>
  `;
}

function renderTopNavLayout() {
  const tabs = ['home', 'jar', 'calendar', 'profile'];
  const tabLabels = { home: 'Home', jar: 'Jar', calendar: 'Calendar', profile: 'Profile' };

  const tabsHTML = tabs.map(t => {
    const isActive = state.activeTab === t;
    return `<div class="top-nav-tab ${isActive ? 'active' : ''}" onclick="switchTab('${t}')">${tabLabels[t]}</div>`;
  }).join('');

  return `
    <div class="top-bar">
      <span class="top-bar-title">Forever Fireflies</span>
      <div class="top-bar-icons">
        <div class="icon-btn">${searchIcon}</div>
      </div>
    </div>
    <div class="top-nav-tabs" id="top-nav-tabs">${tabsHTML}</div>
    <div class="content-scroll" id="scrollable-content">
      ${getScreenContent(state.activeTab)}
    </div>
    <div class="mic-area">
      <button class="mic-btn">${micSVG}</button>
      <span class="write-link">or write instead</span>
    </div>
  `;
}

// ============= MAIN RENDER =============

function render() {
  const screen = document.getElementById('app-screen');
  switch (state.layout) {
    case 'current': screen.innerHTML = renderCurrentLayout(); break;
    case 'bottom-bar': screen.innerHTML = renderBottomBarLayout(); break;
    case 'top-nav': screen.innerHTML = renderTopNavLayout(); break;
  }

  // Attach scroll listener for top-nav layout
  if (state.layout === 'top-nav') {
    const scrollEl = document.getElementById('scrollable-content');
    const tabsEl = document.getElementById('top-nav-tabs');
    if (scrollEl && tabsEl) {
      let lastScrollTop = 0;
      scrollEl.addEventListener('scroll', () => {
        const st = scrollEl.scrollTop;
        if (st > lastScrollTop && st > 40) {
          tabsEl.classList.add('hidden');
        } else if (st < lastScrollTop) {
          tabsEl.classList.remove('hidden');
        }
        lastScrollTop = st;
      });
    }
  }

  updatePrompt();
}

function setLayout(layout) {
  state.layout = layout;
  state.activeTab = 'home';

  // Update control buttons
  document.querySelectorAll('#layout-controls button').forEach(btn => {
    btn.classList.remove('active');
    if (btn.textContent.toLowerCase().replace(' ', '-') === layout ||
        (layout === 'current' && btn.textContent === 'Current') ||
        (layout === 'bottom-bar' && btn.textContent === 'Bottom Bar') ||
        (layout === 'top-nav' && btn.textContent === 'Top Nav')) {
      btn.classList.add('active');
    }
  });

  render();
}

function switchTab(tab) {
  if (tab === 'mic') return; // mic isn't a real tab
  state.activeTab = tab;
  render();
}

// ============= PROMPT =============

function updatePrompt() {
  const promptEl = document.getElementById('prompt-text');
  const layoutDescriptions = {
    'current': 'Keep the current stack-based navigation — no tab bar. Home screen has the app title with search, heart (Firefly Jar), and settings icons in the top-right. Large floating mic button at the bottom with "or write instead" link. All other screens push on top of Home via the stack.',
    'bottom-bar': 'Switch to a bottom tab bar with 5 items: Home, Jar, a raised center mic button, Calendar, and Profile. The mic button is 56px, raised above the tab bar, and uses the accent orange with a glow shadow. Each tab shows an icon and label. The top bar simplifies to just the app title and a search icon. Active tab uses accent color, inactive uses textSoft. Use Expo Router\'s tab layout.',
    'top-nav': 'Add a top navigation bar below the app title with 4 tab links: Home, Jar, Calendar, Profile. The active tab has an accent-colored underline. On scroll down, the tab row slides up and hides (250ms ease transition). On scroll back up, it reappears. The floating mic button stays fixed at the bottom of every screen — always prominent, no competition from a bottom bar. This preserves the mic as the hero element while giving every section its own discoverable entry point.'
  };

  const screenNote = state.activeTab !== 'home'
    ? ` Currently previewing the ${state.activeTab === 'jar' ? 'Firefly Jar' : state.activeTab.charAt(0).toUpperCase() + state.activeTab.slice(1)} screen.`
    : '';

  promptEl.textContent = layoutDescriptions[state.layout] + screenNote;
}

function copyPrompt() {
  const text = document.getElementById('prompt-text').textContent;
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById('copy-btn');
    btn.textContent = 'Copied!';
    btn.classList.add('copied');
    setTimeout(() => {
      btn.textContent = 'Copy Prompt';
      btn.classList.remove('copied');
    }, 1500);
  });
}

// ============= INIT =============
render();
</script>
</body>
</html>
